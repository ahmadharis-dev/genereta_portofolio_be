name: Java Spring Boot CD (Docker)

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Install cloudflared
        run: |
          curl -L --output cloudflared.deb https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64.deb
          sudo dpkg -i cloudflared.deb

      - name: Setup SSH & Deploy
        env:
          SSH_PRIVATE_KEY: ${{ secrets.PRIVATE_KEY }}
          SSH_HOST: ssh.serversandgen.web.id
          SSH_USER: ${{ secrets.USERNAME }}
        run: |
          # 1. Siapkan SSH Directory & Key
          mkdir -p ~/.ssh
          echo "$SSH_PRIVATE_KEY" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa

          # 2. Buat file config SSH (Cara ini jauh lebih stabil)
          cat <<EOF > ~/.ssh/config
          Host myserver
              HostName $SSH_HOST
              User $SSH_USER
              IdentityFile ~/.ssh/id_rsa
              ProxyCommand cloudflared access ssh --hostname %h
              StrictHostKeyChecking no
              UserKnownHostsFile /dev/null
          EOF

          # 3. Jalankan perintah di server menggunakan nama Host 'myserver'
          ssh myserver << 'EOF'
            set -e
            PROJECT_DIR="/var/www/genereta_portofolio_be"
            cd $PROJECT_DIR
            
            echo "Pulling latest changes..."
            git config --global --add safe.directory $PROJECT_DIR
            git fetch origin main
            git reset --hard origin/main
            
            echo "Building application with Maven..."
            chmod +x mvnw
            ./mvnw clean package -DskipTests
            
            echo "Building Docker Image..."
            docker build -t gen-portfolio-be .
            
            echo "Restarting Container..."
            docker stop gen-portfolio-container || true
            docker rm gen-portfolio-container || true
            
            docker run -d \
              --name gen-portfolio-container \
              -p 8080:8080 \
              --restart unless-stopped \
              gen-portfolio-be
              
            echo "Deployment Berhasil!"
          EOF
