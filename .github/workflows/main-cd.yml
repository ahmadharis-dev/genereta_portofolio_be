name: Java Spring Boot CD (Docker)

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Install cloudflared
        run: |
          curl -L --output cloudflared.deb https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64.deb
          sudo dpkg -i cloudflared.deb

      - name: Setup SSH & Deploy
        env:
          SSH_PRIVATE_KEY: ${{ secrets.PRIVATE_KEY }}
          SSH_HOST: ssh.serversandgen.web.id
          SSH_USER: ${{ secrets.USERNAME }}
        run: |
          mkdir -p ~/.ssh
          # Menggunakan printf untuk menjaga format baris baru pada Private Key
          printf "%s\n" "$SSH_PRIVATE_KEY" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa

          cat <<EOF > ~/.ssh/config
          Host myserver
              HostName $SSH_HOST
              User $SSH_USER
              IdentityFile ~/.ssh/id_rsa
              ProxyCommand cloudflared access ssh --hostname %h
              StrictHostKeyChecking no
              UserKnownHostsFile /dev/null
              ConnectTimeout 30
          EOF

          # Menjalankan perintah di server
          ssh myserver << 'EOF'
            set -e
            PROJECT_DIR="/var/www/genereta_portofolio_be"
            
            # Pastikan direktori ada, jika belum ada clone dulu (opsional)
            if [ ! -d "$PROJECT_DIR" ]; then
              echo "Directory $PROJECT_DIR not found!"
              exit 1
            fi

            cd $PROJECT_DIR
            
            echo "Pulling latest changes..."
            git config --global --add safe.directory $PROJECT_DIR
            git fetch origin main
            git reset --hard origin/main
            
            echo "Building application with Maven..."
            chmod +x mvnw
            ./mvnw clean package -DskipTests
            
            echo "Building Docker Image..."
            docker build -t gen-portfolio-be .
            
            echo "Restarting Container..."
            docker stop gen-portfolio-container || true
            docker rm gen-portfolio-container || true
            
            docker run -d \
              --name gen-portfolio-container \
              -p 8080:8080 \
              --restart unless-stopped \
              gen-portfolio-be
              
            echo "Deployment Berhasil!"
          EOF
