name: Java Spring Boot CD (Docker)

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Install cloudflared
        run: |
          curl -L --output cloudflared.deb https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64.deb
          sudo dpkg -i cloudflared.deb

      - name: Setup SSH & Deploy
        env:
          SSH_PRIVATE_KEY: ${{ secrets.PRIVATE_KEY }}
          SSH_HOST: ssh.serversandgen.web.id
          SSH_USER: ${{ secrets.USERNAME }}
        run: |
          # 1. Siapkan SSH Key
          mkdir -p ~/.ssh
          echo "$SSH_PRIVATE_KEY" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          
          # 2. Masukkan perintah ke dalam variabel agar tidak berantakan saat dikirim
          DEPLOY_SCRIPT=$(cat << 'EOF'
            set -e
            PROJECT_DIR="/var/www/genereta_portofolio_be"
            cd $PROJECT_DIR
            
            echo "Pulling latest changes..."
            git config --global --add safe.directory $PROJECT_DIR
            git fetch origin main
            git reset --hard origin/main
            
            echo "Building application with Maven..."
            chmod +x mvnw
            ./mvnw clean package -DskipTests
            
            echo "Building Docker Image..."
            docker build -t gen-portfolio-be .
            
            echo "Restarting Container..."
            docker stop gen-portfolio-container || true
            docker rm gen-portfolio-container || true
            
            docker run -d \
              --name gen-portfolio-container \
              -p 8080:8080 \
              --restart unless-stopped \
              gen-portfolio-be
              
            echo "Deployment Berhasil!"
          EOF
          )

          # 3. Jalankan SSH dengan satu baris perintah yang bersih
          ssh -i ~/.ssh/id_rsa \
            -o "ProxyCommand=cloudflared access ssh --hostname $SSH_HOST" \
            -o "StrictHostKeyChecking=no" \
            -o "UserKnownHostsFile=/dev/null" \
            $SSH_USER@$SSH_HOST "$DEPLOY_SCRIPT"
